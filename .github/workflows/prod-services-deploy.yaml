name: prod-services-deploy

on:
  push:
    paths:
    - 'services/**'
    - 'crates/**'
    - 'migrations/schema/*'
    - 'migrations/seed/*'
    - 'docker/**'
    branches:
    - 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_prod:
    name: deploy services to prod cloud environment
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - name: mask values
        run: echo "::add-mask::${{ secrets.AWS_ACCOUNT_ID }}"
      - name: deploy lambda services to prod cloud environment
        run: |
          for app_dir in $(bash scripts/list-deployments.sh | grep -v client); do
            app=$(basename $app_dir)
            CONF_PATH=$(bash scripts/dir-to-conf-path.sh "$app_dir")
            DEPLOY_TARGET=$(yq "$CONF_PATH.deploy_target" project.yaml)
            if [[ "$DEPLOY_TARGET" != "lambda" ]]; then
              echo "*** skipping $app (deploy_target: $DEPLOY_TARGET)"
              continue
            fi
            # tag newly pushed prod images with master merge commit sha
            bash scripts/tag-merge-commit.sh --app-name $app --env prod --env-id ${{ secrets.PROD_ENV_ID }};
            # deploy newly tagged images to prod cloud
            bash scripts/deploy-last-image.sh --app-name $app --env prod --env-id ${{ secrets.PROD_ENV_ID }};
          done