name: local-integration

on:
  workflow_dispatch:
  push:
    paths:
    - 'tests/**'
    branches-ignore:
    - 'master'
    - 'develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache_images:
    name: cache base images
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: restore image cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ~/image-cache
          key: local-integ-base-images-v1
      - name: pull and retag images
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/image-cache
          docker pull ghcr.io/systemaccounting/postgresql:15
          docker tag ghcr.io/systemaccounting/postgresql:15 public.ecr.aws/bitnami/postgresql:15
          docker pull ghcr.io/systemaccounting/redis:latest
          docker tag ghcr.io/systemaccounting/redis:latest public.ecr.aws/bitnami/redis:latest
          docker pull ghcr.io/systemaccounting/lambda-provided:al2023
          docker tag ghcr.io/systemaccounting/lambda-provided:al2023 public.ecr.aws/lambda/provided:al2023
          docker save -o ~/image-cache/images.tar \
            public.ecr.aws/bitnami/postgresql:15 \
            public.ecr.aws/bitnami/redis:latest \
            public.ecr.aws/lambda/provided:al2023

  compile:
    name: compile ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - graphql
          - request-create
          - request-approve
          - rule
          - request-by-id
          - requests-by-account
          - transaction-by-id
          - transactions-by-account
          - balance-by-account
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.service }}
      - name: compile
        run: cargo build -p ${{ matrix.service }}
      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: target/debug/${{ matrix.service }}
          retention-days: 1

  integration_test:
    name: integration test in local docker
    needs: [cache_images, compile]
    runs-on: ubuntu-latest
    env:
      SKIP_CARGO_WATCH: true
    steps:
      - uses: actions/checkout@v4
      - name: restore image cache
        uses: actions/cache@v5
        with:
          path: ~/image-cache
          key: local-integ-base-images-v1
      - name: load cached images
        run: docker load -i ~/image-cache/images.tar
      - name: restore postgres base stage
        id: pg-base
        uses: actions/cache@v5
        with:
          path: ~/pg-base-cache/postgres-base.tar
          key: postgres-base-${{ hashFiles('docker/bitnami-postgres.Dockerfile') }}
      - name: build postgres base stage
        if: steps.pg-base.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/pg-base-cache
          docker build \
            --target base \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t mxf-postgres-base \
            -f docker/bitnami-postgres.Dockerfile .
          docker save -o ~/pg-base-cache/postgres-base.tar mxf-postgres-base
      - name: load postgres base stage
        if: steps.pg-base.outputs.cache-hit == 'true'
        run: docker load -i ~/pg-base-cache/postgres-base.tar
      - name: download all binaries
        uses: actions/download-artifact@v4
        with:
          path: target/debug/
          merge-multiple: true
      - name: set permissions
        run: chmod +x target/debug/*
      - name: stop runner postgres
        run: sudo systemctl stop postgresql
      - name: start services
        run: make start
      - name: test service integration
        run: make -C ./tests test-local
      - name: clean up
        run: make stop
