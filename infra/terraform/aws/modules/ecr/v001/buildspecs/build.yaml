version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
      - export SHORT_SHA=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION:-$CODEBUILD_BUILD_ID} | sed 's/.*://' | cut -c1-7)
      - export ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ENV_ID/$ENV/$SERVICE_NAME
      - |
        if [ "${DEPLOY:-false}" = "true" ]; then
          if [ "$DEPLOY_TARGET" = "lambda" ]; then export DEPLOY_LAMBDA=true; fi
          if [ "$DEPLOY_TARGET" = "ecs" ]; then export DEPLOY_ECS=true; fi
        fi
  build:
    commands:
      - echo "building $SERVICE_NAME (RUN_TESTS=$RUN_TESTS, PUSH_IMAGE=$PUSH_IMAGE)..."
      - docker build --build-arg RUN_TESTS=$RUN_TESTS -t $SERVICE_NAME:$SHORT_SHA -f docker/$SERVICE_NAME.Dockerfile .
      - docker tag $SERVICE_NAME:$SHORT_SHA $ECR_URI:$SHORT_SHA
      - docker tag $SERVICE_NAME:$SHORT_SHA $ECR_URI:latest
  post_build:
    commands:
      - |
        if [ "$PUSH_IMAGE" = "true" ]; then
          echo "pushing $SERVICE_NAME..."
          docker push $ECR_URI:$SHORT_SHA
          docker push $ECR_URI:latest
        else
          echo "skipping push (PUSH_IMAGE=$PUSH_IMAGE)"
        fi
      - |
        if [ "$DEPLOY_LAMBDA" = "true" ]; then
          echo "deploying $SERVICE_NAME to lambda..."
          aws lambda update-function-code \
            --function-name $SERVICE_NAME-$ENV_ID-$ENV \
            --image-uri $ECR_URI:latest \
            --region $REGION
        fi
      - |
        if [ "$DEPLOY_ECS" = "true" ]; then
          echo "deploying $SERVICE_NAME to ecs..."
          CLUSTER=$ENV_ID-$ENV
          ECS_SERVICE=$SERVICE_NAME-$ENV_ID-$ENV
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text \
            --region $REGION)
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $CURRENT_TASK_DEF_ARN \
            --query 'taskDefinition.{family:family,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,cpu:cpu,memory:memory,containerDefinitions:containerDefinitions}' \
            --output json \
            --region $REGION)
          NEW_CONTAINER_DEFS=$(echo "$TASK_DEF" | jq ".containerDefinitions[0].image = \"$ECR_URI:$SHORT_SHA\" | .containerDefinitions")
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family "$(echo "$TASK_DEF" | jq -r '.family')" \
            --task-role-arn "$(echo "$TASK_DEF" | jq -r '.taskRoleArn')" \
            --execution-role-arn "$(echo "$TASK_DEF" | jq -r '.executionRoleArn')" \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu "$(echo "$TASK_DEF" | jq -r '.cpu')" \
            --memory "$(echo "$TASK_DEF" | jq -r '.memory')" \
            --container-definitions "$NEW_CONTAINER_DEFS" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text \
            --region $REGION)
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_TASK_DEF_ARN \
            --force-new-deployment \
            --region $REGION > /dev/null
          echo "*** $ECS_SERVICE deployed with $ECR_URI:$SHORT_SHA"
        fi
